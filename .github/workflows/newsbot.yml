name: AI News Bot
on:
  schedule:
    - cron: '0 7,10,13,16 * * *'
  workflow_dispatch:

jobs:
  post-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache posted articles DB
        id: cache-db
        uses: actions/cache@v4
        with:
          path: |
            ainovosti.db
            instagram_session.pkl
          key: ainovosti-db

      - name: Install system fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-dejavu-core

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news collector
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          THEME: ai
          BRAND_NAME: AINOVOSTI.RU
          DATABASE_PATH: ainovosti.db
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
        run: python main.py --once

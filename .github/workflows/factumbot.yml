name: FACTUM Bot
on:
  schedule:
    - cron: '30 6,10,14,18 * * *'
  workflow_dispatch:

jobs:
  post-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache posted articles DB
        id: cache-db
        uses: actions/cache@v4
        with:
          path: |
            bot_facts.db
          key: factum-db

      - name: Install system fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-dejavu-core

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run facts collector
        env:
          BOT_TOKEN: ${{ secrets.FACTUM_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.FACTUM_CHANNEL_ID }}
          THEME: facts
          BRAND_NAME: FACTUM.RU
          DATABASE_PATH: bot_facts.db
        run: python main.py --once
